<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ヒットのレシピ — ワクワクの素 かけ算メーカー</title>
<meta name="description" content="売れてるゲーム・おもちゃ・サービスにかくれている「ワクワクの素」をカードにしました。かけ合わせるだけで、あなただけのアイデアレシピができあがるブレストツール。">
<meta name="theme-color" content="#ff5238">
<link rel="canonical" href="https://hit-no-recipe.pages.dev/">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍳</text></svg>">
<meta property="og:title" content="ヒットのレシピ — ワクワクの素 かけ算メーカー">
<meta property="og:description" content="売れてる商品の「ワクワクの素」をかけ合わせて、アイデアレシピを作ろう。大人のブレストにも自由研究にも。">
<meta property="og:type" content="website">
<meta property="og:url" content="https://hit-no-recipe.pages.dev/">
<meta property="og:site_name" content="ヒットのレシピ">
<meta property="og:image" content="https://hit-no-recipe.pages.dev/ogp.png">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image" content="https://hit-no-recipe.pages.dev/ogp.png">
<style>
  :root{
    --bg:#fffdf7;
    --ink:#14120e;
    --sub:#6f6a5e;
    --tomato:#ff5238;
    --lemon:#ffd23f;
    --leaf:#2eb872;
    --bd:2px solid var(--ink);
    --hard:4px 4px 0 var(--ink);
    --hard-sm:3px 3px 0 var(--ink);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    background:var(--bg);
    background-image:radial-gradient(#eee9db 1px, transparent 1px);
    background-size:22px 22px;
    color:var(--ink);
    font-family:"Hiragino Maru Gothic ProN","BIZ UDPGothic","Yu Gothic",sans-serif;
    line-height:1.7;
    padding-bottom:130px;
  }

  header{text-align:center;padding:42px 16px 10px}
  .badge-row{display:flex;justify-content:center;gap:8px;margin-bottom:14px;flex-wrap:wrap}
  .badge{
    font-size:11px;font-weight:800;
    background:#fff;border:var(--bd);border-radius:999px;
    padding:3px 12px;box-shadow:var(--hard-sm);
  }
  .badge.b1{background:var(--lemon)}
  .badge.b2{background:#ffe3de}
  .badge.b3{background:#dff5e9}
  h1{font-size:clamp(30px,8vw,52px);font-weight:800;letter-spacing:.02em;line-height:1.25}
  h1 .mark{background:linear-gradient(transparent 62%, var(--lemon) 62%);padding:0 4px}
  .tagline{font-size:13.5px;font-weight:700;color:var(--sub);max-width:580px;margin:10px auto 0}

  .gacha-bar{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin:22px auto 6px}
  .gacha-bar button{
    font-family:inherit;font-weight:800;font-size:14px;
    border:var(--bd);border-radius:14px;cursor:pointer;
    padding:11px 20px;background:var(--lemon);color:var(--ink);
    box-shadow:var(--hard);transition:transform .08s, box-shadow .08s;
  }
  .gacha-bar button:active{transform:translate(3px,3px);box-shadow:1px 1px 0 var(--ink)}
  .gacha-bar button.ghost{background:#fff}

  .wrap{max-width:820px;margin:0 auto;padding:0 14px}

  h2.cat-label{
    display:inline-block;font-size:13px;font-weight:800;
    background:var(--ink);color:#fff;border-radius:8px;
    padding:4px 14px;margin:26px 0 10px;box-shadow:var(--hard-sm);
  }
  h2.cat-label .step{color:var(--lemon);margin-right:6px}

  .cat{
    background:#fff;border:var(--bd);border-radius:16px;
    padding:13px 15px;margin-bottom:12px;
    box-shadow:var(--hard);position:relative;
  }
  .cat::before{
    content:"";position:absolute;left:-2px;top:14px;bottom:14px;
    width:7px;background:var(--cc);border-radius:0 4px 4px 0;
  }
  .cat-head{display:flex;align-items:center;gap:8px;font-weight:800;font-size:15px;margin-bottom:9px}
  .cat-head .n{font-size:10.5px;color:var(--sub);font-weight:700;margin-left:auto}
  .chips{display:flex;flex-wrap:wrap;gap:8px}
  .chip{
    font-family:inherit;font-size:13px;font-weight:700;
    padding:7px 14px;border-radius:999px;cursor:pointer;
    background:#fff;color:var(--ink);border:var(--bd);
    transition:transform .08s;user-select:none;
  }
  .chip:hover{transform:translateY(-2px)}
  .chip.on{background:var(--cc);box-shadow:var(--hard-sm);transform:translateY(-2px)}
  .chip.flash{animation:pop .35s ease}
  @keyframes pop{0%{transform:scale(.6)}60%{transform:scale(1.18)}100%{transform:scale(1) translateY(-2px)}}

  .forge{
    position:fixed;left:0;right:0;bottom:0;z-index:20;
    background:#fff;border-top:var(--bd);
    box-shadow:0 -6px 0 rgba(20,18,14,.12);
    max-height:74vh;display:flex;flex-direction:column;
    transition:transform .25s ease;
  }
  .forge.min{transform:translateY(calc(100% - 56px))}
  .forge-handle{
    display:flex;align-items:center;gap:9px;
    padding:15px 18px;cursor:pointer;
    font-weight:800;font-size:15px;
    border:none;background:none;color:var(--ink);font-family:inherit;
    width:100%;text-align:left;
  }
  .forge-handle .count{
    background:var(--tomato);color:#fff;border:var(--bd);
    border-radius:999px;font-size:11px;padding:1px 10px;
  }
  .forge-handle .updown{margin-left:auto;color:var(--sub);font-size:12px;font-weight:700}
  .forge-body{overflow-y:auto;padding:0 18px 18px}
  .recipe{
    background:#fffbe8;border:2px dashed var(--ink);border-radius:12px;
    padding:13px 15px;font-size:14.5px;min-height:54px;font-weight:700;
  }
  .recipe .ph{color:var(--sub);font-weight:400}
  .recipe b{background:linear-gradient(transparent 62%, var(--lemon) 62%)}
  .sel-chips{display:flex;flex-wrap:wrap;gap:7px;margin:11px 0}
  .sel-chips .sc{
    font-size:11.5px;font-weight:800;background:var(--cc);color:var(--ink);
    border:var(--bd);border-radius:999px;padding:3px 11px;cursor:pointer;
  }
  .sel-chips .sc::after{content:" ×";opacity:.6}
  .forge input,.forge textarea{
    width:100%;font-family:inherit;font-size:14px;font-weight:700;
    background:#fff;border:var(--bd);border-radius:10px;color:var(--ink);
    padding:10px 13px;margin-top:9px;
  }
  .forge textarea{min-height:64px;resize:vertical;font-weight:400}
  .forge input::placeholder,.forge textarea::placeholder{color:#aaa;font-weight:400}
  .forge-btns{display:flex;gap:9px;margin-top:12px}
  .forge-btns button{
    flex:1;font-family:inherit;font-weight:800;font-size:14px;
    border:var(--bd);border-radius:12px;padding:12px;cursor:pointer;
    box-shadow:var(--hard-sm);transition:transform .08s, box-shadow .08s;
  }
  .forge-btns button:active{transform:translate(2px,2px);box-shadow:1px 1px 0 var(--ink)}
  .btn-save{background:var(--tomato);color:#fff}
  .btn-copy{background:var(--leaf);color:#fff}
  .btn-clear{background:#fff;color:var(--sub);flex:0 0 auto;padding:12px 15px}

  .ideas{margin-top:30px}
  .ideas-head{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
  .ideas-head h2.cat-label{margin-right:auto}
  .export-actions{display:flex;gap:8px;flex-wrap:wrap}
  .export-actions button{
    font-family:inherit;font-size:12px;font-weight:800;
    background:#fff;color:var(--ink);border:var(--bd);border-radius:10px;
    padding:7px 11px;box-shadow:var(--hard-sm);cursor:pointer;
  }
  .export-actions button:disabled{color:var(--sub);opacity:.45;box-shadow:none;cursor:not-allowed}
  .idea-card{
    background:#fff;border:var(--bd);border-radius:16px;
    padding:15px 17px;margin-bottom:12px;box-shadow:var(--hard);
  }
  .idea-card h3{font-size:15.5px;margin-bottom:4px}
  .idea-card h3 .date{font-size:10.5px;color:var(--sub);font-weight:400}
  .idea-card .tags{display:flex;flex-wrap:wrap;gap:5px;margin:7px 0}
  .idea-card .tag{
    font-size:10.5px;font-weight:700;background:var(--bg);
    border:1.5px solid var(--ink);border-radius:999px;padding:2px 9px;
  }
  .idea-card .memo{font-size:12.5px;color:var(--sub);white-space:pre-wrap}
  .idea-card .acts{display:flex;gap:14px;margin-top:9px}
  .idea-card .acts button{
    font-family:inherit;font-size:12px;font-weight:800;
    background:none;border:none;cursor:pointer;color:var(--tomato);padding:0;
  }
  .idea-card .acts button.del{color:var(--sub)}
  .empty{
    text-align:center;color:var(--sub);font-size:13px;font-weight:700;
    padding:26px;border:2px dashed var(--ink);border-radius:16px;background:#fff;
  }
  .toast{
    position:fixed;left:50%;bottom:96px;transform:translateX(-50%) translateY(20px);
    background:var(--ink);color:#fff;font-size:13px;font-weight:800;
    padding:11px 22px;border-radius:999px;
    opacity:0;pointer-events:none;transition:all .25s;z-index:50;
    box-shadow:var(--hard-sm);
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>

<header>
  <div class="badge-row">
    <span class="badge b1">登録不要</span>
    <span class="badge b2">3秒で開始</span>
    <span class="badge b3">大人も子どもも</span>
  </div>
  <h1>🍳 ヒットの<span class="mark">レシピ</span></h1>
  <p class="tagline">売れてるゲームやおもちゃ、人気のサービスには「ワクワクの素」がかくれています。カードを選んでかけ合わせると、あなただけのアイデアレシピのできあがり。迷ったらガチャ🎲</p>
</header>

<div class="gacha-bar">
  <button onclick="gacha(3)">🎲 おまかせガチャ</button>
  <button onclick="gacha(5)">🎰 全部おまかせ</button>
  <button class="ghost" onclick="clearAll()">リセット</button>
</div>

<div class="wrap">
  <h2 class="cat-label"><span class="step">STEP 1</span>だれを喜ばせる？</h2>
  <div id="targets"></div>

  <h2 class="cat-label"><span class="step">STEP 2</span>どんな「困った」を解決する？</h2>
  <div id="pains"></div>

  <h2 class="cat-label"><span class="step">STEP 3</span>ワクワクの素で味付け（いくつでもOK）</h2>
  <div id="elements"></div>

  <h2 class="cat-label"><span class="step">STEP 4</span>どうやってお金にする？</h2>
  <div id="money"></div>

  <div class="ideas">
    <div class="ideas-head">
      <h2 class="cat-label">📖 マイレシピ帳</h2>
      <div class="export-actions" aria-label="レシピをまとめて書き出し">
        <button id="copyAllBtn" onclick="copyAllIdeas()">まとめて書き出し（コピー）</button>
        <button id="downloadAllBtn" onclick="downloadAllIdeas()">まとめて書き出し（.txt）</button>
      </div>
    </div>
    <div id="ideaList"></div>
  </div>

  <footer style="text-align:center;padding:34px 8px 6px;font-size:11.5px;font-weight:700;color:var(--sub)">
    レシピはこの端末の中だけに保存されます（外部送信なし）<br>
    © 2026 <a href="https://github.com/kkp-15/hit-no-recipe" target="_blank" rel="noopener" style="color:inherit">kkp-15 (GitHub)</a> · MIT License
  </footer>
</div>

<div class="forge min" id="forge">
  <button class="forge-handle" onclick="toggleForge()">
    🍳 レシピボード <span class="count" id="selCount">0</span>
    <span class="updown" id="forgeArrow">▲ ひらく</span>
  </button>
  <div class="forge-body">
    <div class="recipe" id="recipe"></div>
    <div class="sel-chips" id="selChips"></div>
    <input id="ideaTitle" placeholder="レシピに名前を付けよう（例: わすれんぼ お助けアプリ）">
    <textarea id="ideaMemo" placeholder="ひらめきメモ（書かなくてもOK）"></textarea>
    <div class="forge-btns">
      <button class="btn-save" onclick="saveIdea()">📖 レシピ帳に保存</button>
      <button class="btn-copy" onclick="copyRecipe()">📋 コピー</button>
      <button class="btn-clear" onclick="clearAll()">✕</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ================= データ ================= */
const CATS = [
  {id:"c1", icon:"🎰", name:"ドキドキ（当たるかも！）", color:"#ffb3be",
   chips:["ガチャ・ランダム","めったに出ないレアもの","当たったときの派手な演出","開けるときのワクワク","1日1回無料","確率が見える"]},
  {id:"c2", icon:"📚", name:"集めたくなる", color:"#ffd28f",
   chips:["図鑑をうめる","シリーズでそろえる","ここだけの限定もの","バッジ・称号","スタンプラリー","「あと◯個！」表示"]},
  {id:"c3", icon:"🗣️", name:"みんなでワイワイ", color:"#a8e6c3",
   chips:["結果を友だちに見せる","ランキング","対戦","協力プレイ","家族に自慢できる","話したくなるネタ"]},
  {id:"c4", icon:"🔁", name:"毎日やりたくなる", color:"#a9d7f5",
   chips:["今日の1問","連続記録（ストリーク）","お知らせが届く","毎日新しくなる","ログインボーナス","毎日の習慣にくっつける"]},
  {id:"c5", icon:"📈", name:"成長がうれしい", color:"#cdbcf2",
   chips:["レベルアップ","グラフで成長が見える","検定・段位","小さなクリアがいっぱい","ビフォーアフター","苦手を教えてくれる"]},
  {id:"c6", icon:"⚡", name:"すぐ遊べる・かんたん", color:"#f2e394",
   chips:["インストールいらない","登録いらない","3秒でスタート","1画面で完結","ネットなしでも動く","説明なしでわかる"]},
  {id:"c7", icon:"🎨", name:"自分だけの", color:"#f7bede",
   chips:["名前を付けられる","きせかえ・色えらび","自由にならべる","自分専用の設定","作品を画像にできる","自分で作れる"]},
  {id:"c8", icon:"🦁", name:"キャラと世界観", color:"#9fe3db",
   chips:["マスコットキャラ","キャラがほめてくれる","お話がつづく","好きなもの・推しと合体","音・BGM","デザインをそろえる"]},
];
const TARGETS = {id:"t", icon:"🎯", name:"ターゲット", color:"#b9c2f5",
  chips:["子ども・親子","学生","忙しい大人","主婦・主夫","おじいちゃん・おばあちゃん世代","趣味の仲間","ご近所・地域の人","ペットと暮らす人","健康が気になる人","昔の自分と同じ悩みの人"]};
const PAINS = {id:"p", icon:"😣", name:"困った", color:"#f0a8c8",
  chips:["時間がない","お金が貯まらない","三日坊主で続かない","面倒くさい","やり方がわからない","忘れちゃう","選べない・迷う","不安・心配","ひとりで心細い","恥ずかしくて聞けない","退屈・ヒマ","片づけ・管理がぐちゃぐちゃ"]};
const MONEY = {id:"m", icon:"💰", name:"お金のしくみ", color:"#e3d78f",
  chips:["広告をのせる","商品を紹介する（アフィリエイト）","作ったものを売る","月額会員（サブスク）","買い切りで売る","お仕事の依頼につなげる","スポンサーに応援してもらう","無料でファンを増やす"]};

/* ====== 安全ストレージ(プレビューではメモリ、公開後はlocalStorage) ====== */
const memStore = {};
const store = {
  get(k){ try{ return localStorage.getItem(k); }catch(e){ return memStore[k] ?? null; } },
  set(k,v){ try{ localStorage.setItem(k,v); }catch(e){ memStore[k]=v; } }
};

/* ====== 状態 ====== */
let selected = [];
let ideas = JSON.parse(store.get("kkp_ideas") || "[]");

/* ====== 描画 ====== */
function renderCats(){
  const html = c => `
    <div class="cat" style="--cc:${c.color}">
      <div class="cat-head"><span>${c.icon}</span>${c.name}<span class="n">${c.chips.length}個</span></div>
      <div class="chips">
        ${c.chips.map(ch=>`<button class="chip" data-cat="${c.id}" data-chip="${ch}" data-color="${c.color}" onclick="tapChip(this)">${ch}</button>`).join("")}
      </div>
    </div>`;
  document.getElementById("elements").innerHTML = CATS.map(html).join("");
  document.getElementById("targets").innerHTML = html(TARGETS);
  document.getElementById("pains").innerHTML = html(PAINS);
  document.getElementById("money").innerHTML = html(MONEY);
}

function tapChip(el, silent){
  const key = el.dataset.cat + "|" + el.dataset.chip;
  const idx = selected.findIndex(s=>s.key===key);
  if(idx>=0){ selected.splice(idx,1); el.classList.remove("on"); }
  else{
    selected.push({key, cat:el.dataset.cat, chip:el.dataset.chip, color:el.dataset.color});
    el.classList.add("on","flash");
    setTimeout(()=>el.classList.remove("flash"),400);
  }
  updateForge();
  if(!silent && selected.length===1) openForge(true);
}

function splitSel(){
  return {
    t: selected.filter(s=>s.cat==="t").map(s=>s.chip),
    p: selected.filter(s=>s.cat==="p").map(s=>s.chip),
    m: selected.filter(s=>s.cat==="m").map(s=>s.chip),
    e: selected.filter(s=>!["t","p","m"].includes(s.cat)).map(s=>s.chip)
  };
}

function buildRecipeHtml(){
  const {t,p,m,e} = splitSel();
  let txt = "";
  txt += t.length ? `<b>${t.join("・")}</b>の` : "（だれか）の";
  txt += p.length ? `「<b>${p.join("・")}</b>」を、` : "（困った）を、";
  txt += e.length ? `<b>${e.join("</b> × <b>")}</b>のかけ合わせで解決するサービス！` : "（ワクワクの素）で解決するサービス！";
  txt += m.length ? `お金のしくみは<b>${m.join("・")}</b>。` : "";
  return txt;
}

function recipeText(){
  const {t,p,m,e} = splitSel();
  return `${t.length?t.join("・"):"（だれか）"}の「${p.length?p.join("・"):"（困った）"}」を、${e.join(" × ")||"（ワクワクの素）"}のかけ合わせで解決するサービス！${m.length?"お金のしくみは"+m.join("・")+"。":""}`;
}

function updateForge(){
  document.getElementById("selCount").textContent = selected.length;
  document.getElementById("selChips").innerHTML = selected.map((s,i)=>
    `<span class="sc" style="--cc:${s.color}" onclick="removeSel(${i})">${s.chip}</span>`).join("");
  const r = document.getElementById("recipe");
  if(selected.length===0){
    r.innerHTML = '<span class="ph">カードを選ぶと、ここにレシピが書き上がります</span>';
    return;
  }
  r.innerHTML = buildRecipeHtml();
}

function removeSel(i){
  const s = selected[i];
  const btn = document.querySelector(`.chip.on[data-cat="${s.cat}"][data-chip="${s.chip}"]`);
  if(btn) btn.classList.remove("on");
  selected.splice(i,1);
  updateForge();
}

function clearAll(){
  selected = [];
  document.querySelectorAll(".chip.on").forEach(b=>b.classList.remove("on"));
  document.getElementById("ideaTitle").value = "";
  document.getElementById("ideaMemo").value = "";
  updateForge();
}

/* ====== ガチャ ====== */
function gacha(n){
  clearAll();
  const pool = [];
  const cats = [...CATS].sort(()=>Math.random()-.5).slice(0,n);
  cats.forEach(c=>{
    pool.push({cat:c.id, chip:c.chips[Math.floor(Math.random()*c.chips.length)]});
  });
  pool.push({cat:"t", chip:TARGETS.chips[Math.floor(Math.random()*TARGETS.chips.length)]});
  pool.push({cat:"p", chip:PAINS.chips[Math.floor(Math.random()*PAINS.chips.length)]});
  pool.push({cat:"m", chip:MONEY.chips[Math.floor(Math.random()*MONEY.chips.length)]});
  pool.forEach((pk,i)=>{
    setTimeout(()=>{
      const btn = document.querySelector(`.chip[data-cat="${pk.cat}"][data-chip="${pk.chip}"]`);
      if(btn) tapChip(btn, true);
      if(i===pool.length-1) openForge(true);
    }, i*180);
  });
}

/* ====== 保存・コピー ====== */
function saveIdea(){
  if(selected.length===0){ toast("カードを選んでね"); return; }
  const title = document.getElementById("ideaTitle").value.trim() || "名前のないレシピ";
  ideas.unshift({
    id: Date.now(),
    title,
    recipe: recipeText(),
    chips: selected.map(s=>s.chip),
    memo: document.getElementById("ideaMemo").value.trim(),
    date: new Date().toLocaleDateString("ja-JP")
  });
  store.set("kkp_ideas", JSON.stringify(ideas));
  renderIdeas();
  toast("📖 レシピ帳に保存しました！");
  clearAll();
}

function copyRecipe(){
  if(selected.length===0){ toast("カードを選んでね"); return; }
  const title = document.getElementById("ideaTitle").value.trim();
  const memo = document.getElementById("ideaMemo").value.trim();
  const md = `## ${title||"新アイデア"}\n\n**レシピ:** ${recipeText()}\n**選んだカード:** ${selected.map(s=>s.chip).join(" / ")}\n${memo?"**メモ:** "+memo+"\n":""}\n（このレシピをもとに、具体的なサービス・商品の企画に落とし込んでください）`;
  copyText(md, "📋 AIに貼れる形式でコピーしました");
}

function copyIdea(id){
  const it = ideas.find(i=>i.id===id);
  if(!it) return;
  copyText(ideaMarkdown(it), "📋 コピーしました");
}

function ideaMarkdown(it){
  const title = esc(it.title);
  const recipe = esc(it.recipe);
  const chips = (Array.isArray(it.chips) ? it.chips : []).map(c=>esc(c)).join(" / ");
  const memo = it.memo ? `**メモ:** ${esc(it.memo)}\n` : "";
  return `## ${title}\n\n**レシピ:** ${recipe}\n**選んだカード:** ${chips}\n${memo}\n（このレシピをもとに、具体的なサービス・商品の企画に落とし込んでください）`;
}

function allIdeasMarkdown(){
  return ideas.map(ideaMarkdown).join("\n\n---\n\n");
}

function copyAllIdeas(){
  if(ideas.length===0) return;
  copyText(allIdeasMarkdown(), "📋 すべてのレシピをコピーしました");
}

function downloadAllIdeas(){
  if(ideas.length===0) return;
  const blob = new Blob([allIdeasMarkdown()], {type:"text/plain;charset=utf-8"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "hit-no-recipe-all.txt";
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
  toast("すべてのレシピを.txtで保存しました");
}

function copyText(txt, msg){
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(txt).then(()=>toast(msg)).catch(()=>fallbackCopy(txt,msg));
  }else fallbackCopy(txt,msg);
}
function fallbackCopy(txt,msg){
  const ta=document.createElement("textarea");
  ta.value=txt;document.body.appendChild(ta);ta.select();
  try{document.execCommand("copy");toast(msg);}catch(e){toast("コピーできませんでした");}
  ta.remove();
}

function delIdea(id){
  ideas = ideas.filter(i=>i.id!==id);
  store.set("kkp_ideas", JSON.stringify(ideas));
  renderIdeas();
}

function renderIdeas(){
  const box = document.getElementById("ideaList");
  document.getElementById("copyAllBtn").disabled = ideas.length===0;
  document.getElementById("downloadAllBtn").disabled = ideas.length===0;
  if(ideas.length===0){
    box.innerHTML = '<div class="empty">まだレシピがありません。カードをかけ合わせて、最初の一皿を作ろう🍳</div>';
    return;
  }
  box.innerHTML = ideas.map(it=>`
    <div class="idea-card">
      <h3>🍽 ${esc(it.title)} <span class="date">${esc(it.date)}</span></h3>
      <div style="font-size:13px">${esc(it.recipe)}</div>
      <div class="tags">${it.chips.map(c=>`<span class="tag">${esc(c)}</span>`).join("")}</div>
      ${it.memo?`<div class="memo">📝 ${esc(it.memo)}</div>`:""}
      <div class="acts">
        <button onclick="copyIdea(${it.id})">📋 コピー</button>
        <button class="del" onclick="delIdea(${it.id})">🗑 削除</button>
      </div>
    </div>`).join("");
}

function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}

function toggleForge(){
  const f = document.getElementById("forge");
  f.classList.toggle("min");
  document.getElementById("forgeArrow").textContent = f.classList.contains("min") ? "▲ ひらく" : "▼ とじる";
}
function openForge(open){
  const f = document.getElementById("forge");
  f.classList.toggle("min", !open);
  document.getElementById("forgeArrow").textContent = open ? "▼ とじる" : "▲ ひらく";
}

let toastTimer;
function toast(msg){
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.classList.remove("show"), 2200);
}

renderCats();
renderIdeas();
updateForge();
</script>
</body>
</html>
